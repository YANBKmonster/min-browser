<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif; }
    #toolbar {
      display: flex; align-items: center; gap: 6px;
      height: 50px; padding: 0 10px;
      background: #f0f0f0; border-bottom: 1px solid #ccc;
    }
    #toolbar button {
      width: 32px; height: 32px; border: none; cursor: pointer;
      border-radius: 4px; font-size: 16px; background: transparent;
    }
    #toolbar button:hover { background: #ddd; }
    #lang-btn {
      font-size: 12px !important; font-weight: bold;
      width: 36px !important; color: #4a90d9;
    }
    #address-bar {
      flex: 1; height: 32px; padding: 0 10px; border: 1px solid #bbb;
      border-radius: 16px; font-size: 13px; outline: none;
    }
    #address-bar:focus { border-color: #4a90d9; }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="back-btn" title="后退">◀</button>
    <button id="fwd-btn" title="前进">▶</button>
    <button id="reload-btn" title="刷新">↻</button>
    <input id="address-bar" type="text" placeholder="输入网址..." />
    <button id="go-btn" title="前往">前往</button>
    <button id="help-btn" title="帮助">?</button>
    <button id="lang-btn">EN</button>
  </div>

  <script>
    const i18n = {
      zh: {
        back: '后退', forward: '前进', reload: '刷新',
        go: '前往', help: '帮助', placeholder: '输入网址...', langBtn: 'EN',
      },
      en: {
        back: 'Back', forward: 'Forward', reload: 'Reload',
        go: 'Go', help: 'Help', placeholder: 'Enter URL...', langBtn: '中',
      }
    }

    let currentLang = localStorage.getItem('lang') || 'zh'

    function applyI18n(lang) {
      currentLang = lang
      localStorage.setItem('lang', lang)
      document.getElementById('back-btn').title = i18n[lang].back
      document.getElementById('fwd-btn').title = i18n[lang].forward
      document.getElementById('reload-btn').title = i18n[lang].reload
      document.getElementById('go-btn').title = i18n[lang].go
      document.getElementById('help-btn').title = i18n[lang].help
      document.getElementById('address-bar').placeholder = i18n[lang].placeholder
      document.getElementById('go-btn').textContent = i18n[lang].go
      document.getElementById('lang-btn').textContent = i18n[lang].langBtn
      window.browserAPI.setLang(lang)
    }

    const addressBar = document.getElementById('address-bar')
    const goBtn = document.getElementById('go-btn')
    const backBtn = document.getElementById('back-btn')
    const fwdBtn = document.getElementById('fwd-btn')
    const reloadBtn = document.getElementById('reload-btn')

    function fixUrl(input) {
      input = input.trim()
      if (!input) return ''
      if (!/^https?:\/\//i.test(input)) return 'https://' + input
      return input
    }

    function navigate() {
      const url = fixUrl(addressBar.value)
      if (url) window.browserAPI.navigate(url)
    }

    goBtn.addEventListener('click', navigate)
    addressBar.addEventListener('keydown', (e) => { if (e.key === 'Enter') navigate() })
    backBtn.addEventListener('click', () => window.browserAPI.goBack())
    fwdBtn.addEventListener('click', () => window.browserAPI.goForward())
    reloadBtn.addEventListener('click', () => window.browserAPI.reload())
    document.getElementById('help-btn').addEventListener('click', () => window.browserAPI.openHelp())
    document.getElementById('lang-btn').addEventListener('click', () => {
      applyI18n(currentLang === 'zh' ? 'en' : 'zh')
    })

    window.browserAPI.onUrlChanged((url) => {
      addressBar.value = url
    })

    applyI18n(currentLang)
    window.browserAPI.createWebview()
    window.addEventListener('resize', () => window.browserAPI.resizeWebview())
  </script>
</body>
</html>
